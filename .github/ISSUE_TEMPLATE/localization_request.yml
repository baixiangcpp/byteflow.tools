name: Localization request
description: Report unclear or missing localized copy.
title: "i18n: "
labels:
  - documentation
  - localization
body:
  - type: markdown
    attributes:
      value: |
        Do not paste sensitive payloads or private screenshots. If a localized string appears near tool input or output, describe the location without sharing real data.
  - type: dropdown
    id: locale
    attributes:
      label: Locale
      options:
        - zh-CN
        - zh-TW
        - ja
        - ko
        - de
        - fr
        - en
        - Multiple locales
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Page or tool
      placeholder: https://byteflow.tools/fr/json-formatter
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What should change?
      description: Explain the unclear, missing, or inaccurate localized copy.
    validations:
      required: true
