name: Feature request
description: Suggest a browser-local tool or improvement.
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Do not post production secrets, private payloads, customer data, tokens, logs, HAR files, private URLs, request bodies, response bodies, prompts, generated output, or screenshots containing sensitive content. Use sanitized examples only.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the tool, behavior, or improvement you want.
    validations:
      required: true
  - type: textarea
    id: inputs_outputs
    attributes:
      label: Inputs and outputs
      description: What input should the feature accept, and what output should it produce?
    validations:
      required: false
  - type: dropdown
    id: privacy
    attributes:
      label: Local-first fit
      description: Can this run entirely in the browser without sending user payloads to a server?
      options:
        - Yes
        - Mostly, with documented limitations
        - No
        - Not sure
    validations:
      required: true
  - type: textarea
    id: related
    attributes:
      label: Related tools or references
      description: Link related Byteflow tools, comparable products, specs, or examples.
    validations:
      required: false
