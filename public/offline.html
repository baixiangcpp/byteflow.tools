<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Offline fallback page for byteflow.tools. Reconnect to load the latest page or open a page you have already cached."
    />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="canonical" href="https://byteflow.tools/offline.html" />
    <title>Offline | byteflow.tools</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b1220;
        color: #e2e8f0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(560px, calc(100vw - 32px));
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 16px;
        background: rgba(15, 23, 38, 0.82);
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }
      p {
        margin: 0;
        line-height: 1.6;
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>
        byteflow.tools could not reach the network for this page yet. Reconnect and refresh, or open a page you have
        visited before.
      </p>
    </main>
  </body>
</html>
